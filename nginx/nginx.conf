worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;  # Hide nginx version from Server header

    sendfile        on;
    keepalive_timeout 30s;

    # Client timeout hardening — prevent slow-loris style attacks
    client_body_timeout    30s;
    client_header_timeout  30s;
    send_timeout           30s;

    # Security headers applied at proxy level
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "DENY"                            always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;

    server {
        listen 80;
        server_name _;

        # Redirect HTTP → HTTPS in production (uncomment when TLS is configured)
        # return 301 https://$host$request_uri;

        client_max_body_size 12M;
        autoindex off;

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Tighter rate limit on login endpoint
            location /api/v1/auth/login {
                limit_req zone=login burst=3 nodelay;
                proxy_pass http://backend:8000;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }

        # ── React SPA ─────────────────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively; HTML never cached
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Block access to dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
